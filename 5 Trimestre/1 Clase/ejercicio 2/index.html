<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Rejilla Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4">

    <div class="container">
        <h1 class="mb-4">Ejercicio</h1>
        
        <h2 class="h5">Tamaño extra small</h2>
        <div class="row mb-5">
            <div class="col-6 custom-col">1</div>
            <div class="col-6 custom-col">2</div>
            <div class="col-6 custom-col">3</div>
            <div class="col-6 custom-col">4</div>
            <div class="col-12 custom-col">1</div>
            <div class="col-12 custom-col">2</div>
            <div class="col-12 custom-col">3</div>
            <div class="col-12 custom-col">4</div>
            <div class="col-12 custom-col">5</div>
            <div class="col-12 custom-col">6</div>
            <div class="col-12 custom-col">7</div>
            <div class="col-12 custom-col">8</div>
            <div class="col-12 custom-col">9</div>
            <div class="col-12 custom-col">10</div>
        </div>

        <h2 class="h5">Tamaño mediano</h2>
        <div class="row mb-5">
            <div class="col-md-3 custom-col">1</div>
            <div class="col-md-3 custom-col">2</div>
            <div class="col-md-3 custom-col">3</div>
            <div class="col-md-3 custom-col">4</div>
            <div class="col-md-6 custom-col">1</div>
            <div class="col-md-6 custom-col">2</div>
            <div class="col-md-6 custom-col">3</div>
            <div class="col-md-6 custom-col">4</div>
            <div class="col-md-6 custom-col">5</div>
            <div class="col-md-6 custom-col">6</div>
            <div class="col-md-6 custom-col">7</div>
            <div class="col-md-6 custom-col">8</div>
            <div class="col-md-6 custom-col">9</div>
            <div class="col-md-6 custom-col">10</div>
        </div>

        <h2 class="h5">Tamaño grande</h2>
        <p class="text-muted small">Las columnas inferiores se reparten equitativamente sin especificar tamaño fijo.</p>
        <div class="row">
            <div class="col-lg-3 custom-col">1</div>
            <div class="col-lg-3 custom-col">2</div>
            <div class="col-lg-3 custom-col">3</div>
            <div class="col-lg-3 custom-col">4</div>
            
            <div class="col custom-col">1</div>
            <div class="col custom-col">2</div>
            <div class="col custom-col">3</div>
            <div class="col custom-col">4</div>
            <div class="col custom-col">5</div>
            <div class="col custom-col">6</div>
            <div class="col custom-col">7</div>
            <div class="col custom-col">8</div>
            <div class="col custom-col">9</div>
            <div class="col custom-col">10</div>
        </div>
    </div>

</body>
</html>
